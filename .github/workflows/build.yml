name: Build (Windows) - SAM_Revit (2025/2026)

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    # Guard: if this ever gets merged upstream (e.g. HoareLea),
    # it will be "skipped" there and won't break their CI.
    if: github.repository_owner == 'SAM-BIM'
    runs-on: windows-2022

    env:
      MSBUILDDISABLENODEREUSE: "1"
      ORG_NAME: "SAM-BIM"
      REPO_NAME: "SAM_Revit"
      NUGET_XMLDOC_MODE: "skip"

    steps:
      - name: Checkout SAM_Revit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: ${{ env.REPO_NAME }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2
        with:
          nuget-version: "6.x"

      - name: Clone dependency repos (siblings) + build order
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'

          $org   = '${{ env.ORG_NAME }}'
          $repo  = '${{ env.REPO_NAME }}'
          $token = '${{ secrets.ORG_REPO_TOKEN }}'

          function Clone-Repo([string]$name) {
            if (Test-Path $name) { return }
            $url = if ($token) { "https://$token@github.com/$org/$name.git" } else { "https://github.com/$org/$name.git" }
            Write-Host "Cloning $name"
            git clone --depth 1 $url $name
            if ($LASTEXITCODE -ne 0) { throw "Failed to clone $name" }
          }

          # Practical CI order:
          #  - build modules first
          #  - build SAM_UI before Revit bits
          #  - build SAM_Revit_UI with year-specific configs
          #  - then snapshot SAM_Revit year outputs separately
          $deps = @(
            'SAM'
            'SAM_Systems'
            'SAM_Psychrometrics'
            'SAM_Mollier'
            'SAM_Windows'
            'SAM_IFC'
            'SAM_Topologic'
            'SAM_BHom'
            'SAM_gbXML'
            'SAM_GEM'
            'SAM_LadybugTools'
            'SAM_Solver'          # private -> token needed
            'SAM_SolarCalculator'
            'SAM_Tas'
            'SAM_Excel'
            'SAM_SQLite'
            'SAM_OpenStudio'      # x64
            'SAM_Multitasker'
            'SAM_UI'
            'SAM_Revit_UI'
          )

          foreach ($r in $deps) { Clone-Repo $r }

          # Ensure build folders exist (some projects expect these paths)
          New-Item -ItemType Directory -Force -Path "SAM_Windows\build" | Out-Null
          New-Item -ItemType Directory -Force -Path "SAM_UI\build"      | Out-Null

      - name: Restore + Rebuild shared deps (ordered)
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'

          function Find-Solution([string]$repoName) {
            $expected = Join-Path $repoName "$repoName.sln"
            if (Test-Path $expected) { return (Resolve-Path $expected).Path }

            $rootSln = Get-ChildItem -Path $repoName -Filter *.sln -File -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($rootSln) { return $rootSln.FullName }

            $anySln = Get-ChildItem -Path $repoName -Recurse -Filter *.sln -File -ErrorAction SilentlyContinue |
                      Where-Object { $_.FullName -notmatch '\\(bin|obj|packages)\\' } |
                      Select-Object -First 1
            if ($anySln) { return $anySln.FullName }

            throw "No .sln found under: $repoName"
          }

          $orderedRepos = @(
            'SAM'
            'SAM_Systems'
            'SAM_Psychrometrics'
            'SAM_Mollier'
            'SAM_Windows'
            'SAM_IFC'
            'SAM_Topologic'
            'SAM_BHom'
            'SAM_gbXML'
            'SAM_GEM'
            'SAM_LadybugTools'
            'SAM_Solver'
            'SAM_SolarCalculator'
            'SAM_Tas'
            'SAM_Excel'
            'SAM_SQLite'
            'SAM_OpenStudio'
            'SAM_Multitasker'
            'SAM_UI'
          )

          $platformOverride = @{
            'SAM_OpenStudio' = 'x64'
          }

          $winBuild = (Resolve-Path 'SAM_Windows\build').Path
          $uiBuild  = (Resolve-Path 'SAM_UI\build').Path
          $env:ReferencePath = "$winBuild;$uiBuild"
          Write-Host "ReferencePath=$env:ReferencePath"

          $msbuildBase = @(
            '/m:1'
            '/nr:false'
            '/v:m'
            '/p:UseSharedCompilation=false'
            '/p:RunPostBuildEvent=OnOutputUpdated'
          )

          function Msbuild-ConfigPlatform([string]$cfg, [string]$plat) {
            $args = @("/p:Configuration=$cfg")
            if ($plat) { $args += "/p:Platform=$plat" }
            return $args
          }

          function Restore-Build([string]$repoName, [string]$cfg, [string]$plat) {
            $sln = Find-Solution $repoName
            Write-Host ""
            Write-Host "=== $repoName ==="
            Write-Host "Solution: $sln"

            $cfgArgs = Msbuild-ConfigPlatform $cfg $plat

            Write-Host "-> msbuild restore ($cfg | $plat)"
            & msbuild $sln /t:Restore @msbuildBase @cfgArgs
            if ($LASTEXITCODE -ne 0) { throw "MSBuild restore failed: $repoName ($cfg | $plat)" }

            Write-Host "-> msbuild rebuild ($cfg | $plat)"
            & msbuild $sln /t:Rebuild @msbuildBase @cfgArgs
            if ($LASTEXITCODE -ne 0) { throw "MSBuild rebuild failed: $repoName ($cfg | $plat)" }
          }

          foreach ($r in $orderedRepos) {
            $plat = 'Any CPU'
            if ($platformOverride.ContainsKey($r)) { $plat = $platformOverride[$r] }
            Restore-Build $r 'Release' $plat
          }

      - name: Build + snapshot Revit 2025
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'

          function Find-Solution([string]$repoName) {
            $expected = Join-Path $repoName "$repoName.sln"
            if (Test-Path $expected) { return (Resolve-Path $expected).Path }

            $rootSln = Get-ChildItem -Path $repoName -Filter *.sln -File -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($rootSln) { return $rootSln.FullName }

            $anySln = Get-ChildItem -Path $repoName -Recurse -Filter *.sln -File -ErrorAction SilentlyContinue |
                      Where-Object { $_.FullName -notmatch '\\(bin|obj|packages)\\' } |
                      Select-Object -First 1
            if ($anySln) { return $anySln.FullName }

            throw "No .sln found under: $repoName"
          }

          function Copy-FolderContents([string]$src, [string]$dst) {
            if (-not (Test-Path $src)) {
              throw "Source folder not found: $src"
            }
            New-Item -ItemType Directory -Force -Path $dst | Out-Null
            Copy-Item (Join-Path $src '*') $dst -Recurse -Force
          }

          function Build-RevitConfig([string]$repoName, [string]$cfg) {
            $sln = Find-Solution $repoName

            $winBuild = (Resolve-Path 'SAM_Windows\build').Path
            $uiBuild  = (Resolve-Path 'SAM_UI\build').Path
            $env:ReferencePath = "$winBuild;$uiBuild"
            Write-Host "ReferencePath=$env:ReferencePath"

            $args = @(
              '/m:1'
              '/nr:false'
              '/v:m'
              '/p:UseSharedCompilation=false'
              '/p:RunPostBuildEvent=OnOutputUpdated'
              "/p:Configuration=$cfg"
              '/p:Platform=Any CPU'
            )

            Write-Host "=== $repoName ($cfg) ==="
            & msbuild $sln /t:Restore @args
            if ($LASTEXITCODE -ne 0) { throw "MSBuild restore failed: $repoName ($cfg)" }

            & msbuild $sln /t:Rebuild @args
            if ($LASTEXITCODE -ne 0) { throw "MSBuild rebuild failed: $repoName ($cfg)" }
          }

          Build-RevitConfig 'SAM_Revit_UI' 'Release2025'
          Build-RevitConfig 'SAM_Revit'    'Release2025'

          $out = "_ci_artifacts\Revit 2025"
          New-Item -ItemType Directory -Force -Path $out | Out-Null

          $dstRevit = Join-Path $out "SAM_Revit"
          $dstRevitUi = Join-Path $out "SAM_Revit_UI"
          Copy-FolderContents "SAM_Revit\build"    $dstRevit
          Copy-FolderContents "SAM_Revit_UI\build" $dstRevitUi

          if (-not (Test-Path (Join-Path $dstRevit "SAM.Core.Revit.dll"))) {
            throw "Missing SAM.Core.Revit.dll in Revit 2025 snapshot"
          }
          if (-not (Test-Path (Join-Path $dstRevitUi "SAM.Revit.UI.dll"))) {
            throw "Missing SAM.Revit.UI.dll in Revit 2025 snapshot"
          }

      - name: Clean Revit build folders before 2026
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $paths = @(
            'SAM_Revit\build',
            'SAM_Revit_UI\build'
          )
          foreach ($p in $paths) {
            if (Test-Path $p) {
              Remove-Item $p -Recurse -Force
            }
            New-Item -ItemType Directory -Force -Path $p | Out-Null
          }

      - name: Build + snapshot Revit 2026
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'

          function Find-Solution([string]$repoName) {
            $expected = Join-Path $repoName "$repoName.sln"
            if (Test-Path $expected) { return (Resolve-Path $expected).Path }

            $rootSln = Get-ChildItem -Path $repoName -Filter *.sln -File -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($rootSln) { return $rootSln.FullName }

            $anySln = Get-ChildItem -Path $repoName -Recurse -Filter *.sln -File -ErrorAction SilentlyContinue |
                      Where-Object { $_.FullName -notmatch '\\(bin|obj|packages)\\' } |
                      Select-Object -First 1
            if ($anySln) { return $anySln.FullName }

            throw "No .sln found under: $repoName"
          }

          function Copy-FolderContents([string]$src, [string]$dst) {
            if (-not (Test-Path $src)) {
              throw "Source folder not found: $src"
            }
            New-Item -ItemType Directory -Force -Path $dst | Out-Null
            Copy-Item (Join-Path $src '*') $dst -Recurse -Force
          }

          function Build-RevitConfig([string]$repoName, [string]$cfg) {
            $sln = Find-Solution $repoName

            $winBuild = (Resolve-Path 'SAM_Windows\build').Path
            $uiBuild  = (Resolve-Path 'SAM_UI\build').Path
            $env:ReferencePath = "$winBuild;$uiBuild"
            Write-Host "ReferencePath=$env:ReferencePath"

            $args = @(
              '/m:1'
              '/nr:false'
              '/v:m'
              '/p:UseSharedCompilation=false'
              '/p:RunPostBuildEvent=OnOutputUpdated'
              "/p:Configuration=$cfg"
              '/p:Platform=Any CPU'
            )

            Write-Host "=== $repoName ($cfg) ==="
            & msbuild $sln /t:Restore @args
            if ($LASTEXITCODE -ne 0) { throw "MSBuild restore failed: $repoName ($cfg)" }

            & msbuild $sln /t:Rebuild @args
            if ($LASTEXITCODE -ne 0) { throw "MSBuild rebuild failed: $repoName ($cfg)" }
          }

          Build-RevitConfig 'SAM_Revit_UI' 'Release2026'
          Build-RevitConfig 'SAM_Revit'    'Release2026'

          $out = "_ci_artifacts\Revit 2026"
          New-Item -ItemType Directory -Force -Path $out | Out-Null

          $dstRevit = Join-Path $out "SAM_Revit"
          $dstRevitUi = Join-Path $out "SAM_Revit_UI"
          Copy-FolderContents "SAM_Revit\build"    $dstRevit
          Copy-FolderContents "SAM_Revit_UI\build" $dstRevitUi

          if (-not (Test-Path (Join-Path $dstRevit "SAM.Core.Revit.dll"))) {
            throw "Missing SAM.Core.Revit.dll in Revit 2026 snapshot"
          }
          if (-not (Test-Path (Join-Path $dstRevitUi "SAM.Revit.UI.dll"))) {
            throw "Missing SAM.Revit.UI.dll in Revit 2026 snapshot"
          }

      - name: Upload isolated Revit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SAM_Revit-build-folders
          path: |
            _ci_artifacts\Revit 2025\*
            _ci_artifacts\Revit 2026\*
          if-no-files-found: error
